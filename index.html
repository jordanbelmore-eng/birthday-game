<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Austin and Jordan: Six Years of Adventure!</title>
  <style>
    :root{
      --bg:#101010;
      --panel:#00000099;
      --text:#ffffff;
      --gold:#ffd54a;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:linear-gradient(#111,#000);
      color:var(--text);
      font-family:monospace;
      text-align:center;
    }
    h1{margin:10px 8px 4px;font-size:22px}
    .subtitle{margin:0 8px 10px;font-size:13px;opacity:.95}
    canvas{
      border:4px solid #fff;
      image-rendering:pixelated;
      image-rendering:crisp-edges;
      max-width:calc(100vw - 12px);
      height:auto;
      background:black;
      touch-action:none;
    }
    .controls{
      margin:10px auto 14px;
      max-width:980px;
      font-size:13px;
      line-height:1.45;
      padding:0 10px;
    }
    .mobile-controls{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:10px;
      max-width:680px;
      margin:0 auto 18px;
      padding:0 8px 20px;
    }
    .mobile-controls button{
      width:74px;height:52px;font-size:20px;
      border:2px solid #fff;background:#222;color:#fff;
      border-radius:10px;font-family:monospace;
    }
    .mobile-controls button:active{transform:scale(.98);background:#333}
  </style>
</head>
<body>
  <h1>Austin and Jordan: Six Years of Adventure!</h1>
  <div class="subtitle">Birthday Edition Deluxe</div>

  <canvas id="game" width="960" height="540"></canvas>

  <div class="controls">
    <b>Keyboard:</b> Enter = Start, Arrow Keys / A D = Move, W / Up / Space = Jump, X = Attack, C = Switch Character, M = Mute<br>
    <b>Phone:</b> use the buttons below. Best played in landscape.
  </div>

  <div class="mobile-controls">
    <button id="leftBtn">◀</button>
    <button id="rightBtn">▶</button>
    <button id="jumpBtn">▲</button>
    <button id="attackBtn">X</button>
    <button id="swapBtn">C</button>
  </div>

<script>
(() => {
  "use strict";

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const W = canvas.width;
  const H = canvas.height;
  const TILE = 32;
  const GRAVITY = 0.55;
  const MAX_FALL = 12;

  const keys = Object.create(null);
  let started = false;
  let won = false;
  let muted = false;
  let showTouchHint = true;
  let time = 0;
  let cameraX = 0;
  let levelIndex = 0;
  let boss = null;
  let particles = [];
  let projectiles = [];
  let banners = [];
  let stars = [];
  let prevJump = false;
  let prevAttack = false;
  let audioStarted = false;

  function clamp(n, min, max){ return Math.max(min, Math.min(max, n)); }
  function rand(a,b){ return a + Math.random() * (b-a); }
  function overlap(a,b){
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }
  function drawRect(g,x,y,w,h,c){ g.fillStyle = c; g.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h)); }

  for (let i=0;i<80;i++){
    stars.push({x:Math.random()*W,y:Math.random()*180,s:1+Math.random()*2,a:0.2+Math.random()*0.8});
  }

  const audio = {
    ctx: null,
    master: null
  };

  function initAudio(){
    if (audioStarted || muted) return;
    try{
      audio.ctx = new (window.AudioContext || window.webkitAudioContext)();
      audio.master = audio.ctx.createGain();
      audio.master.gain.value = 0.03;
      audio.master.connect(audio.ctx.destination);
      audioStarted = true;
    }catch(e){}
  }

  function beep(freq=440,dur=0.08,type="square",vol=0.06,when=0){
    if (muted) return;
    initAudio();
    if (!audio.ctx) return;
    const t0 = audio.ctx.currentTime + when;
    const osc = audio.ctx.createOscillator();
    const gain = audio.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(vol, t0+0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    osc.connect(gain);
    gain.connect(audio.master);
    osc.start(t0);
    osc.stop(t0+dur+0.01);
  }

  function playSfx(name){
    if (name === "jump"){ beep(420,0.05,"square",0.05); beep(620,0.04,"square",0.04,0.03); }
    else if (name === "coin"){ beep(880,0.04,"square",0.05); beep(1175,0.06,"triangle",0.05,0.04); }
    else if (name === "hit"){ beep(140,0.08,"sawtooth",0.05); }
    else if (name === "attack"){ beep(300,0.03,"square",0.035); beep(220,0.04,"square",0.025,0.02); }
    else if (name === "enemy"){ beep(190,0.05,"sawtooth",0.04); beep(120,0.05,"square",0.03,0.04); }
    else if (name === "checkpoint"){ beep(523,0.05,"square",0.04); beep(659,0.05,"square",0.04,0.05); beep(784,0.08,"triangle",0.04,0.1); }
    else if (name === "goal"){ beep(523,0.05,"square",0.04); beep(659,0.05,"square",0.04,0.05); beep(784,0.05,"square",0.04,0.1); beep(1047,0.12,"triangle",0.04,0.16); }
    else if (name === "bossHit"){ beep(160,0.06,"sawtooth",0.05); beep(260,0.05,"square",0.05,0.05); }
    else if (name === "win"){ [523,659,784,1047,1319].forEach((n,i)=>beep(n,0.12,"triangle",0.04,i*0.08)); }
  }

  const music = {
    step: 0,
    timer: 0,
    melodies: {
      hospital: [523,659,784,659,523,659,784,988],
      classroom: [392,440,523,587,523,440,392,330],
      hockey: [523,523,659,784,659,523,784,659],
      forest: [392,494,587,659,587,494,440,392],
      church: [262,330,392,523,392,330,294,262],
      lava: [196,262,294,349,294,262,220,196]
    }
  };

  function updateMusic(){
    if (!started || won || muted) return;
    initAudio();
    if (!audio.ctx) return;
    music.timer++;
    if (music.timer % 24 !== 0) return;
    const lvl = currentLevel();
    const seq = music.melodies[lvl.theme] || music.melodies.hospital;
    const note = seq[music.step % seq.length];
    const bass = Math.max(110, note / 2);
    beep(note,0.11,"square",0.025);
    beep(bass,0.09,"triangle",0.015,0.01);
    music.step++;
  }

  document.addEventListener("keydown", e => {
    const k = e.key.toLowerCase();
    keys[k] = true;
    if (e.key === "Enter") { started = true; initAudio(); }
    if (k === "c") { swapCharacter(); initAudio(); }
    if (k === "m") { muted = !muted; if (!muted) initAudio(); }
    if (["arrowup","arrowdown","arrowleft","arrowright"," "].includes(k)) e.preventDefault();
  });
  document.addEventListener("keyup", e => { keys[e.key.toLowerCase()] = false; });

  function bindButton(id, keyName, onPress){
    const btn = document.getElementById(id);
    const down = e => {
      e.preventDefault();
      initAudio();
      showTouchHint = false;
      if (keyName) keys[keyName] = true;
      if (onPress) onPress();
    };
    const up = e => {
      e.preventDefault();
      if (keyName) keys[keyName] = false;
    };
    btn.addEventListener("touchstart", down, {passive:false});
    btn.addEventListener("touchend", up, {passive:false});
    btn.addEventListener("mousedown", down);
    btn.addEventListener("mouseup", up);
    btn.addEventListener("mouseleave", up);
  }

  bindButton("leftBtn","arrowleft");
  bindButton("rightBtn","arrowright");
  bindButton("jumpBtn"," ");
  bindButton("attackBtn","x");
  bindButton("swapBtn",null,()=>swapCharacter());

  function swapCharacter(){
    player.character = player.character === 1 ? 2 : 1;
    pushBanner(player.character === 1 ? "Austin in!" : "Jordan in!", 75);
  }

  function makeSpriteSheet(character){
    const frameW = 28, frameH = 42, frames = 6;
    const sheet = document.createElement("canvas");
    sheet.width = frameW * frames;
    sheet.height = frameH;
    const g = sheet.getContext("2d");

    function A(f,ox){
      const walk = (f===1||f===4)?1:(f===2||f===5)?-1:0;
      const arm = (f===1||f===4)?-1:(f===2||f===5)?1:0;
      drawRect(g, ox+6, 0, 16, 6, "#1b7a34");
      drawRect(g, ox+8, 6, 12, 10, "#efc39a");
      drawRect(g, ox+8, 14, 12, 4, "#d97731");
      drawRect(g, ox+5, 18, 18, 14, "#13833d");
      drawRect(g, ox+8, 21, 12, 3, "#f2f2f2");
      drawRect(g, ox+3+arm, 19, 3, 10, "#13833d");
      drawRect(g, ox+22-arm, 19, 3, 10, "#13833d");
      drawRect(g, ox+7+walk, 32, 4, 10, "#493221");
      drawRect(g, ox+16-walk, 32, 4, 10, "#493221");
      drawRect(g, ox+10, 10, 2, 2, "#111");
      drawRect(g, ox+16, 10, 2, 2, "#111");
      if (f===3){ drawRect(g, ox+4, 18, 20, 4, "#7cd6ff"); drawRect(g, ox+22, 19, 6, 3, "#7cd6ff"); }
    }

    function J(f,ox){
      const walk = (f===1||f===4)?1:(f===2||f===5)?-1:0;
      const arm = (f===1||f===4)?-1:(f===2||f===5)?1:0;
      drawRect(g, ox+8, 4, 12, 10, "#efc39a");
      drawRect(g, ox+8, 13, 12, 4, "#7b4a2b");
      drawRect(g, ox+4, 9, 5, 3, "#111");
      drawRect(g, ox+19, 9, 5, 3, "#111");
      drawRect(g, ox+9, 10, 10, 1, "#111");
      drawRect(g, ox+5, 17, 18, 15, "#2859b9");
      drawRect(g, ox+13, 17, 2, 10, "#c92525");
      drawRect(g, ox+3+arm, 19, 3, 10, "#2859b9");
      drawRect(g, ox+22-arm, 19, 3, 10, "#2859b9");
      drawRect(g, ox+7+walk, 32, 4, 10, "#222");
      drawRect(g, ox+16-walk, 32, 4, 10, "#222");
      drawRect(g, ox+10, 10, 2, 2, "#111");
      drawRect(g, ox+16, 10, 2, 2, "#111");
      if (f===3){ drawRect(g, ox+4, 18, 20, 4, "#ffd54a"); drawRect(g, ox+22, 19, 6, 3, "#ffd54a"); }
    }

    for (let f=0; f<frames; f++){
      const ox = f*frameW;
      if (character==="austin") A(f,ox); else J(f,ox);
    }
    return {sheet,frameW,frameH,frames};
  }

  function makeEnemySprite(type){
    const c = document.createElement("canvas");
    c.width = 24; c.height = 24;
    const g = c.getContext("2d");
    if (type==="germ"){
      drawRect(g,3,3,18,18,"#73d43b");
      [[1,7],[19,7],[8,1],[8,19],[16,2],[2,16]].forEach(([x,y])=>drawRect(g,x,y,4,4,"#73d43b"));
      drawRect(g,8,8,2,2,"#111"); drawRect(g,14,8,2,2,"#111");
    } else if (type==="paper"){
      drawRect(g,3,4,18,14,"#fff"); drawRect(g,3,6,18,2,"#ff6666"); drawRect(g,16,4,5,5,"#ddd");
    } else if (type==="puck"){
      drawRect(g,4,4,16,16,"#111"); drawRect(g,7,7,10,10,"#333");
    } else if (type==="spirit"){
      drawRect(g,5,2,14,18,"#d4acff"); drawRect(g,7,18,3,3,"#d4acff"); drawRect(g,14,18,3,3,"#d4acff");
      drawRect(g,8,8,2,2,"#fff"); drawRect(g,14,8,2,2,"#fff");
    } else if (type==="shadow"){
      drawRect(g,4,3,16,18,"#3c2c5a"); drawRect(g,8,8,2,2,"#9d88cc"); drawRect(g,14,8,2,2,"#9d88cc");
    } else if (type==="fire"){
      drawRect(g,7,2,10,18,"#ff6f1f"); drawRect(g,9,8,6,8,"#ffd34a");
    } else if (type==="gift"){
      drawRect(g,4,5,16,14,"#ff4d6d"); drawRect(g,11,5,2,14,"#fff"); drawRect(g,4,11,16,2,"#fff");
    } else if (type==="cake"){
      drawRect(g,4,9,16,10,"#ffe7ae"); drawRect(g,4,7,16,3,"#ff8fab"); drawRect(g,11,3,2,6,"#7ad6ff");
    }
    return c;
  }

  const sprites = {
    austin: makeSpriteSheet("austin"),
    jordan: makeSpriteSheet("jordan"),
    enemies: {
      germ: makeEnemySprite("germ"),
      paper: makeEnemySprite("paper"),
      puck: makeEnemySprite("puck"),
      spirit: makeEnemySprite("spirit"),
      shadow: makeEnemySprite("shadow"),
      fire: makeEnemySprite("fire")
    },
    itemGift: makeEnemySprite("gift"),
    itemCake: makeEnemySprite("cake")
  };

  const player = {
    x: 96, y: 0, w: 26, h: 40,
    vx: 0, vy: 0,
    speed: 2.9,
    jump: 10.7,
    onGround: false,
    facing: 1,
    character: 1,
    health: 5,
    maxHealth: 5,
    coins: 0,
    gifts: 0,
    invuln: 0,
    attackCooldown: 0,
    checkpointX: 96,
    checkpointY: 96
  };

  function pushBanner(text, duration=110){
    banners.push({text, timer: duration, max: duration});
  }

  function addParticles(x,y,color,count=8,spread=3,size=4){
    for(let i=0;i<count;i++){
      particles.push({x,y,vx:(Math.random()-.5)*spread,vy:-Math.random()*3,life:25+Math.random()*20,color,size});
    }
  }

  function createProjectile(x,y,dir,kind){
    projectiles.push({
      x, y, w: 12, h: 8, dir, speed: 6.3, life: 38,
      kind,
      color: kind==="austin" ? "#7cd6ff" : "#ffd54a"
    });
    playSfx("attack");
  }

  function jumpPressed(now){ const p = now && !prevJump; prevJump = now; return p; }
  function attackPressed(now){ const p = now && !prevAttack; prevAttack = now; return p; }

  function makeLevel(name, theme, width, start, tiles, entities, palette, goalX, intro, bossData=null){
    return {
      name, theme, width, start, tiles, entities, palette, intro,
      goal: {x:goalX, y:0, w:32, h:64, open: bossData ? false : true},
      bossData
    };
  }

  function groundRow(widthTiles, t=1){ return new Array(widthTiles).fill(t); }

  function buildLevels(){
    const levels = [];

    {
      const w=110,h=17, tiles=Array.from({length:h},()=>new Array(w).fill(0));
      tiles[16]=groundRow(w,1);
      for(let x=12;x<18;x++) tiles[12][x]=1;
      for(let x=23;x<28;x++) tiles[10][x]=1;
      for(let x=34;x<42;x++) tiles[13][x]=1;
      for(let x=49;x<54;x++) tiles[9][x]=1;
      for(let x=60;x<68;x++) tiles[12][x]=1;
      for(let x=76;x<82;x++) tiles[11][x]=1;
      for(let x=90;x<97;x++) tiles[13][x]=1;
      [20,21,43,55,56,83].forEach(x=>tiles[15][x]=2);
      [[14,11],[25,9],[37,12],[51,8],[63,11],[78,10],[94,12]].forEach(([x,y])=>tiles[y][x]=3);
      tiles[15][58]=4;
      levels.push(makeLevel("Hospital ER","hospital",w*TILE,{x:96,y:300},tiles,[
        {type:"enemy",style:"germ",x:520,y:360,w:24,h:24,minX:480,maxX:650,vx:1,hp:2},
        {type:"enemy",style:"germ",x:1180,y:264,w:24,h:24,minX:1100,maxX:1270,vx:1.2,hp:2},
        {type:"enemy",style:"germ",x:1930,y:328,w:24,h:24,minX:1880,maxX:2070,vx:1.1,hp:2},
        {type:"pickup",style:"gift",x:840,y:420,w:22,h:22}
      ], {sky:"#a8d8f0",far:"#d9f0fa",mid:"#b8dbe8",accent:"#ffffff"}, (w-4)*TILE, "Level 1 • Hospital ER"));
    }

    {
      const w=115,h=17, tiles=Array.from({length:h},()=>new Array(w).fill(0));
      tiles[16]=groundRow(w,1);
      for(let x=10;x<16;x++) tiles[13][x]=1;
      for(let x=20;x<25;x++) tiles[11][x]=1;
      for(let x=30;x<37;x++) tiles[9][x]=1;
      for(let x=44;x<52;x++) tiles[12][x]=1;
      for(let x=59;x<64;x++) tiles[10][x]=1;
      for(let x=71;x<79;x++) tiles[13][x]=1;
      for(let x=87;x<93;x++) tiles[10][x]=1;
      for(let x=100;x<108;x++) tiles[12][x]=1;
      [17,18,39,40,65,80,96].forEach(x=>tiles[15][x]=2);
      [[12,12],[22,10],[33,8],[48,11],[61,9],[75,12],[89,9],[104,11]].forEach(([x,y])=>tiles[y][x]=3);
      tiles[15][67]=4;
      levels.push(makeLevel("School Classroom","classroom",w*TILE,{x:96,y:300},tiles,[
        {type:"enemy",style:"paper",x:400,y:360,w:24,h:20,minX:350,maxX:540,vx:1.5,hp:1},
        {type:"enemy",style:"paper",x:1450,y:264,w:24,h:20,minX:1380,maxX:1600,vx:1.6,hp:1},
        {type:"enemy",style:"paper",x:2820,y:328,w:24,h:20,minX:2740,maxX:3000,vx:1.7,hp:1},
        {type:"pickup",style:"cake",x:2000,y:390,w:22,h:22}
      ], {sky:"#f3d37a",far:"#f7ecc1",mid:"#ddbe72",accent:"#345c98"}, (w-4)*TILE, "Level 2 • School Classroom"));
    }

    {
      const w=120,h=17, tiles=Array.from({length:h},()=>new Array(w).fill(0));
      tiles[16]=groundRow(w,1);
      for(let x=12;x<18;x++) tiles[13][x]=1;
      for(let x=24;x<32;x++) tiles[11][x]=1;
      for(let x=39;x<45;x++) tiles[9][x]=1;
      for(let x=53;x<61;x++) tiles[12][x]=1;
      for(let x=69;x<77;x++) tiles[10][x]=1;
      for(let x=85;x<92;x++) tiles[8][x]=1;
      for(let x=100;x<109;x++) tiles[12][x]=1;
      [19,20,33,46,62,63,93].forEach(x=>tiles[15][x]=2);
      [[14,12],[27,10],[41,8],[57,11],[72,9],[88,7],[104,11]].forEach(([x,y])=>tiles[y][x]=3);
      tiles[15][66]=4;
      levels.push(makeLevel("Hockey Game","hockey",w*TILE,{x:96,y:300},tiles,[
        {type:"enemy",style:"puck",x:510,y:360,w:24,h:24,minX:450,maxX:620,vx:1.7,hp:1},
        {type:"enemy",style:"puck",x:1730,y:264,w:24,h:24,minX:1660,maxX:1820,vx:1.9,hp:1},
        {type:"enemy",style:"puck",x:2660,y:200,w:24,h:24,minX:2580,maxX:2790,vx:2.0,hp:1},
        {type:"pickup",style:"gift",x:3200,y:390,w:22,h:22}
      ], {sky:"#98d7ff",far:"#dff5ff",mid:"#a8d0e7",accent:"#d53333"}, (w-4)*TILE, "Level 3 • Hockey Game"));
    }

    {
      const w=124,h=17, tiles=Array.from({length:h},()=>new Array(w).fill(0));
      tiles[16]=groundRow(w,1);
      for(let x=11;x<18;x++) tiles[13][x]=1;
      for(let x=24;x<30;x++) tiles[11][x]=1;
      for(let x=37;x<44;x++) tiles[9][x]=1;
      for(let x=51;x<56;x++) tiles[7][x]=1;
      for(let x=63;x<70;x++) tiles[11][x]=1;
      for(let x=77;x<84;x++) tiles[9][x]=1;
      for(let x=92;x<99;x++) tiles[7][x]=1;
      for(let x=108;x<116;x++) tiles[12][x]=1;
      [19,31,32,45,57,71,85,100].forEach(x=>tiles[15][x]=2);
      [[14,12],[26,10],[39,8],[53,6],[66,10],[80,8],[95,6],[112,11]].forEach(([x,y])=>tiles[y][x]=3);
      tiles[15][74]=4;
      levels.push(makeLevel("Anime Forest","forest",w*TILE,{x:96,y:300},tiles,[
        {type:"enemy",style:"spirit",x:500,y:360,w:24,h:24,minX:430,maxX:610,vx:1.2,hp:2},
        {type:"enemy",style:"spirit",x:1640,y:264,w:24,h:24,minX:1580,maxX:1740,vx:1.3,hp:2},
        {type:"enemy",style:"spirit",x:2920,y:200,w:24,h:24,minX:2860,maxX:3040,vx:1.4,hp:2},
        {type:"pickup",style:"cake",x:3460,y:360,w:22,h:22}
      ], {sky:"#bdeabf",far:"#e1f7e1",mid:"#84c68b",accent:"#ffb7da"}, (w-4)*TILE, "Level 4 • Anime Forest"));
    }

    {
      const w=118,h=17, tiles=Array.from({length:h},()=>new Array(w).fill(0));
      tiles[16]=groundRow(w,1);
      for(let x=12;x<19;x++) tiles[13][x]=1;
      for(let x=27;x<33;x++) tiles[10][x]=1;
      for(let x=41;x<47;x++) tiles[8][x]=1;
      for(let x=56;x<63;x++) tiles[12][x]=1;
      for(let x=71;x<78;x++) tiles[10][x]=1;
      for(let x=87;x<93;x++) tiles[8][x]=1;
      for(let x=101;x<109;x++) tiles[12][x]=1;
      [20,34,35,48,64,79,94].forEach(x=>tiles[15][x]=2);
      [[15,12],[29,9],[43,7],[59,11],[74,9],[89,7],[105,11]].forEach(([x,y])=>tiles[y][x]=3);
      tiles[15][67]=4;
      levels.push(makeLevel("Church","church",w*TILE,{x:96,y:300},tiles,[
        {type:"enemy",style:"shadow",x:520,y:360,w:24,h:24,minX:450,maxX:620,vx:1.2,hp:2},
        {type:"enemy",style:"shadow",x:1810,y:264,w:24,h:24,minX:1730,maxX:1920,vx:1.3,hp:2},
        {type:"enemy",style:"shadow",x:2850,y:200,w:24,h:24,minX:2780,maxX:2970,vx:1.4,hp:2},
        {type:"pickup",style:"gift",x:2950,y:390,w:22,h:22}
      ], {sky:"#cbb8f5",far:"#ebdefd",mid:"#8a72b6",accent:"#ffe282"}, (w-4)*TILE, "Level 5 • Church"));
    }

    {
      const w=132,h=17, tiles=Array.from({length:h},()=>new Array(w).fill(0));
      tiles[16]=groundRow(w,1);
      for(let x=10;x<16;x++) tiles[13][x]=1;
      for(let x=22;x<28;x++) tiles[11][x]=1;
      for(let x=34;x<40;x++) tiles[9][x]=1;
      for(let x=46;x<52;x++) tiles[11][x]=1;
      for(let x=59;x<68;x++) tiles[13][x]=1;
      for(let x=76;x<82;x++) tiles[10][x]=1;
      for(let x=89;x<95;x++) tiles[8][x]=1;
      for(let x=102;x<109;x++) tiles[10][x]=1;
      for(let x=116;x<131;x++) tiles[13][x]=1;
      [17,18,29,30,41,42,53,54,69,70,83,84,96,97,110,111].forEach(x=>tiles[15][x]=2);
      [[12,12],[24,10],[36,8],[48,10],[62,12],[78,9],[91,7],[104,9]].forEach(([x,y])=>tiles[y][x]=3);
      tiles[15][72]=4;
      levels.push(makeLevel("Final Boss","lava",w*TILE,{x:96,y:300},tiles,[
        {type:"enemy",style:"fire",x:420,y:360,w:24,h:24,minX:350,maxX:520,vx:1.5,hp:1},
        {type:"enemy",style:"fire",x:1890,y:264,w:24,h:24,minX:1810,maxX:2000,vx:1.6,hp:1},
        {type:"pickup",style:"cake",x:3200,y:390,w:22,h:22}
      ], {sky:"#3f1010",far:"#5a1f1f",mid:"#2b2b2b",accent:"#ff7b22"}, (w-3)*TILE, "Level 6 • Final Boss", {
        x:3910,y:300,w:72,h:72,hp:12,minX:3810,maxX:4070,phase:0,cooldown:80
      }));
    }

    return levels;
  }

  const levels = buildLevels();

  function currentLevel(){ return levels[levelIndex]; }

  function startLevel(index){
    levelIndex = index;
    const lvl = currentLevel();
    player.x = lvl.start.x;
    player.y = lvl.start.y;
    player.vx = 0; player.vy = 0;
    player.checkpointX = lvl.start.x;
    player.checkpointY = lvl.start.y;
    player.invuln = 0;
    player.attackCooldown = 0;
    cameraX = 0;
    projectiles = [];
    particles = [];
    music.step = 0;
    music.timer = 0;
    lvl.entities = lvl.entities.map(e => ({...e, dead:false, collected:false, bob:Math.random()*Math.PI*2}));
    boss = lvl.bossData ? {...lvl.bossData, alive:true, dir:1} : null;
    lvl.goal.open = boss ? false : true;
    pushBanner(lvl.intro, 130);
  }

  function nextLevel(){
    playSfx("goal");
    if (levelIndex < levels.length - 1) startLevel(levelIndex + 1);
    else {
      won = true;
      playSfx("win");
    }
  }

  function tileAt(tx,ty){
    const lvl = currentLevel();
    if (ty < 0 || ty >= lvl.tiles.length || tx < 0 || tx >= lvl.tiles[0].length) return 0;
    return lvl.tiles[ty][tx];
  }
  function setTile(tx,ty,val){
    const lvl = currentLevel();
    if (ty < 0 || ty >= lvl.tiles.length || tx < 0 || tx >= lvl.tiles[0].length) return;
    lvl.tiles[ty][tx] = val;
  }
  function isSolid(t){ return t===1; }
  function isHazard(t){ return t===2; }

  function damagePlayer(amount=1){
    if (player.invuln > 0) return;
    player.health -= amount;
    player.invuln = 90;
    addParticles(player.x+player.w/2,player.y+player.h/2,"#ff4d4d",16,4,5);
    playSfx("hit");
    if (player.health <= 0){
      player.health = player.maxHealth;
      startLevel(levelIndex);
    } else {
      player.x = player.checkpointX;
      player.y = player.checkpointY;
      player.vx = 0; player.vy = 0;
    }
  }

  function healPlayer(amount=1){
    player.health = Math.min(player.maxHealth, player.health + amount);
  }

  function resolveTileCollisions(axis){
    const left = Math.floor(player.x / TILE);
    const right = Math.floor((player.x + player.w - 1) / TILE);
    const top = Math.floor(player.y / TILE);
    const bottom = Math.floor((player.y + player.h - 1) / TILE);

    for(let ty=top; ty<=bottom; ty++){
      for(let tx=left; tx<=right; tx++){
        const t = tileAt(tx,ty);
        if (!isSolid(t)) continue;
        const tr = {x:tx*TILE,y:ty*TILE,w:TILE,h:TILE};
        if (!overlap(player,tr)) continue;
        if (axis==="x"){
          if (player.vx > 0) player.x = tr.x - player.w;
          if (player.vx < 0) player.x = tr.x + tr.w;
        } else {
          if (player.vy > 0){
            player.y = tr.y - player.h;
            player.vy = 0;
            player.onGround = true;
          } else if (player.vy < 0){
            player.y = tr.y + tr.h;
            player.vy = 0;
          }
        }
      }
    }
  }

  function collectTileItems(){
    const left = Math.floor(player.x / TILE);
    const right = Math.floor((player.x + player.w - 1) / TILE);
    const top = Math.floor(player.y / TILE);
    const bottom = Math.floor((player.y + player.h - 1) / TILE);

    for(let ty=top; ty<=bottom; ty++){
      for(let tx=left; tx<=right; tx++){
        const t = tileAt(tx,ty);
        if (t === 3){
          setTile(tx,ty,0);
          player.coins++;
          addParticles(tx*TILE+16,ty*TILE+16,"#ffd84a",12,3,4);
          playSfx("coin");
        } else if (t === 4){
          const newX = tx*TILE;
          const newY = ty*TILE-player.h;
          if (player.checkpointX !== newX || player.checkpointY !== newY){
            player.checkpointX = newX;
            player.checkpointY = newY;
            pushBanner("Checkpoint!", 70);
            playSfx("checkpoint");
          }
        }
      }
    }
  }

  function checkHazards(){
    const left = Math.floor(player.x / TILE);
    const right = Math.floor((player.x + player.w - 1) / TILE);
    const top = Math.floor(player.y / TILE);
    const bottom = Math.floor((player.y + player.h - 1) / TILE);
    for(let ty=top; ty<=bottom; ty++){
      for(let tx=left; tx<=right; tx++){
        if (isHazard(tileAt(tx,ty))){ damagePlayer(1); return; }
      }
    }
  }

  function updateProjectiles(){
    const lvl = currentLevel();
    for (const p of projectiles){
      p.x += p.dir * p.speed;
      p.life--;
      if (boss && boss.alive && overlap(p,boss)){
        p.life = 0;
        boss.hp--;
        addParticles(p.x,p.y,p.color,10,3,4);
        playSfx("bossHit");
        if (boss.hp <= 0){
          boss.alive = false;
          lvl.goal.open = true;
          addParticles(boss.x+boss.w/2,boss.y+boss.h/2,"#ffd84a",40,6,5);
          pushBanner("Boss defeated!", 110);
          playSfx("win");
        }
      }
      for (const e of lvl.entities){
        if (e.dead || e.type !== "enemy") continue;
        if (overlap(p,e)){
          p.life = 0;
          e.hp = (e.hp||1) - 1;
          addParticles(e.x+e.w/2,e.y+e.h/2,p.color,8,3,4);
          if (e.hp <= 0){
            e.dead = true;
            addParticles(e.x+e.w/2,e.y+e.h/2,"#fff",14,4,4);
            playSfx("enemy");
          }
          break;
        }
      }
    }
    projectiles = projectiles.filter(p => p.life > 0 && p.x > cameraX - 60 && p.x < cameraX + W + 60);
  }

  function updateEntities(){
    const lvl = currentLevel();
    for (const e of lvl.entities){
      if (e.dead || e.collected) continue;
      e.bob = (e.bob || 0) + 0.05;
      if (e.type === "enemy"){
        e.x += e.vx;
        if (e.x < e.minX || e.x > e.maxX) e.vx *= -1;
        if (overlap(player,e)){
          if (player.vy > 1 && player.y + player.h - 8 < e.y + 12){
            e.hp = (e.hp||1) - 2;
            player.vy = -7;
            addParticles(e.x+e.w/2,e.y+e.h/2,"#fff",12,4,4);
            if (e.hp <= 0){ e.dead = true; playSfx("enemy"); }
          } else {
            damagePlayer(1);
          }
        }
      } else if (e.type === "pickup"){
        const pickupBox = {x:e.x,y:e.y + Math.sin(e.bob)*3,w:e.w,h:e.h};
        if (overlap(player,pickupBox)){
          e.collected = true;
          player.gifts++;
          if (e.style === "cake") healPlayer(1);
          addParticles(e.x+e.w/2,e.y+e.h/2,e.style==="cake" ? "#ff8fab" : "#7ad6ff",16,4,4);
          pushBanner(e.style==="cake" ? "Cake found!" : "Gift found!", 70);
          playSfx("coin");
        }
      }
    }
  }

  function updateBoss(){
    if (!boss || !boss.alive) return;
    boss.x += 1.45 * boss.dir;
    if (boss.x < boss.minX || boss.x > boss.maxX) boss.dir *= -1;
    boss.y = 280 + Math.sin(time/18) * 22;
    boss.cooldown--;
    if (boss.cooldown <= 0){
      boss.cooldown = 70;
      projectiles.push({
        x: boss.x + boss.w/2,
        y: boss.y + boss.h/2,
        w: 12, h: 12,
        dir: player.x < boss.x ? -1 : 1,
        speed: 4.8,
        life: 55,
        kind: "boss",
        color: "#ff7b22",
        hostile: true
      });
    }
    if (overlap(player,boss)){
      if (player.vy > 1 && player.y + player.h - 8 < boss.y + 16){
        boss.hp--;
        player.vy = -8;
        addParticles(boss.x+boss.w/2,boss.y+boss.h/2,"#ff8a22",20,5,5);
        playSfx("bossHit");
        if (boss.hp <= 0){
          boss.alive = false;
          currentLevel().goal.open = true;
          addParticles(boss.x+boss.w/2,boss.y+boss.h/2,"#ffd84a",42,6,5);
          pushBanner("Boss defeated!", 110);
          playSfx("win");
        }
      } else {
        damagePlayer(1);
      }
    }
  }

  function checkGoal(){
    const lvl = currentLevel();
    lvl.goal.y = 16*TILE - 64;
    const goalRect = {x:lvl.goal.x,y:lvl.goal.y,w:lvl.goal.w,h:lvl.goal.h};
    if (lvl.goal.open && overlap(player,goalRect)) nextLevel();
  }

  function updatePlayer(){
    const left = keys["arrowleft"] || keys["a"];
    const right = keys["arrowright"] || keys["d"];
    const jump = keys["arrowup"] || keys["w"] || keys[" "];
    const attack = keys["x"];

    let move = 0;
    if (left) move -= 1;
    if (right) move += 1;
    player.vx = move * player.speed;
    if (move !== 0) player.facing = move;

    if (jumpPressed(jump) && player.onGround){
      player.vy = -player.jump;
      player.onGround = false;
      addParticles(player.x+player.w/2,player.y+player.h,"#fff",5,2,4);
      playSfx("jump");
    }

    if (attackPressed(attack) && player.attackCooldown <= 0){
      createProjectile(player.x + (player.facing > 0 ? player.w+6 : -10), player.y + 18, player.facing, player.character===1 ? "austin" : "jordan");
      player.attackCooldown = 22;
    }

    if (player.attackCooldown > 0) player.attackCooldown--;

    player.vy += GRAVITY;
    if (player.vy > MAX_FALL) player.vy = MAX_FALL;

    player.x += player.vx;
    resolveTileCollisions("x");
    player.y += player.vy;
    player.onGround = false;
    resolveTileCollisions("y");

    if (player.y > H + 120) damagePlayer(1);
    if (player.invuln > 0) player.invuln--;

    collectTileItems();
    checkHazards();
    updateEntities();
    updateProjectiles();
    updateBoss();

    for (const p of projectiles){
      if (p.hostile && overlap(player,p)){ p.life = 0; damagePlayer(1); }
    }

    checkGoal();
    const lvl = currentLevel();
    cameraX = clamp(player.x - W * 0.35, 0, lvl.width - W);
  }

  function updateParticles(){
    for (const p of particles){
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.12;
      p.life -= 1;
    }
    particles = particles.filter(p => p.life > 0);
  }

  function updateBanners(){
    banners = banners.filter(b => --b.timer > 0);
  }

  function drawBackground(lvl){
    ctx.fillStyle = lvl.palette.sky;
    ctx.fillRect(0,0,W,H);

    for (const s of stars){
      if (lvl.theme === "lava" || lvl.theme === "church"){
        ctx.globalAlpha = s.a;
        drawRect(ctx, (s.x - cameraX*0.08 + W) % W, s.y, s.s, s.s, "#fff");
        ctx.globalAlpha = 1;
      }
    }

    if (lvl.theme === "hospital"){
      for(let i=0;i<6;i++){
        const x=200+i*260-cameraX*0.2;
        drawRect(ctx,x,100,90,60,lvl.palette.far);
        drawRect(ctx,x+38,113,14,30,"#d44b4b");
        drawRect(ctx,x+30,121,30,14,"#d44b4b");
      }
    } else if (lvl.theme === "classroom"){
      for(let i=0;i<7;i++){
        const x=140+i*230-cameraX*0.22;
        drawRect(ctx,x,85,90,65,lvl.palette.accent);
        drawRect(ctx,x+10,105,70,45,"#1f3563");
      }
    } else if (lvl.theme === "hockey"){
      for(let i=0;i<12;i++){
        const x=i*140-(cameraX*0.18%140);
        drawRect(ctx,x,135,70,55,"#fff");
        drawRect(ctx,x+28,149,14,24,"#d53333");
        drawRect(ctx,x+22,155,26,12,"#d53333");
      }
    } else if (lvl.theme === "forest"){
      for(let i=0;i<16;i++){
        const x=i*110-(cameraX*0.24%110);
        drawRect(ctx,x+20,160,10,90,"#6b4423");
        drawRect(ctx,x,120,50,40,"#ffbfdc");
        drawRect(ctx,x+8,100,34,28,"#ffbfdc");
      }
    } else if (lvl.theme === "church"){
      for(let i=0;i<8;i++){
        const x=150+i*260-cameraX*0.2;
        drawRect(ctx,x,75,80,130,"#6c5aa0");
        drawRect(ctx,x+33,105,14,48,"#ffe282");
      }
    } else if (lvl.theme === "lava"){
      for(let i=0;i<12;i++){
        const x=i*120-(cameraX*0.22%120);
        drawRect(ctx,x+44,140,10,70,"#ff7b22");
        drawRect(ctx,x+35,165,28,10,"#ff7b22");
      }
    }

    for(let i=0;i<20;i++){
      const x=i*100-(cameraX*0.4%100);
      drawRect(ctx,x,350,60,190,lvl.palette.mid);
    }

    if (lvl.theme === "forest"){
      ctx.globalAlpha = 0.35;
      for (let i=0;i<18;i++){
        drawRect(ctx, ((i*90 - cameraX*0.6) % (W+120)) - 20, 60 + (i%5)*45, 6, 6, "#ffd6ef");
      }
      ctx.globalAlpha = 1;
    }
  }

  function drawTile(tx,ty,t){
    const x=tx*TILE-cameraX, y=ty*TILE;
    const theme=currentLevel().theme;
    if (t===1){
      if (theme==="hospital"){
        drawRect(ctx,x,y,TILE,TILE,"#d6edf7"); drawRect(ctx,x,y,TILE,5,"#fff"); drawRect(ctx,x+4,y+10,24,18,"#8dc6d8");
      } else if (theme==="classroom"){
        drawRect(ctx,x,y,TILE,TILE,"#8b5a2b"); drawRect(ctx,x,y,TILE,5,"#c48a4d"); drawRect(ctx,x+5,y+8,22,18,"#6b421d");
      } else if (theme==="hockey"){
        drawRect(ctx,x,y,TILE,TILE,"#e6f8ff"); drawRect(ctx,x,y+26,TILE,6,"#b2d9ea"); drawRect(ctx,x+14,y,4,TILE,"#d53333");
      } else if (theme==="forest"){
        drawRect(ctx,x,y,TILE,TILE,"#6c4422"); drawRect(ctx,x,y,TILE,7,"#4ca55f"); drawRect(ctx,x+3,y+10,26,18,"#7b532f");
      } else if (theme==="church"){
        drawRect(ctx,x,y,TILE,TILE,"#86623c"); drawRect(ctx,x+4,y+4,24,24,"#ad8858");
      } else if (theme==="lava"){
        drawRect(ctx,x,y,TILE,TILE,"#484848"); drawRect(ctx,x,y+25,TILE,7,"#222"); drawRect(ctx,x+4,y+4,24,16,"#5a5a5a");
      }
    } else if (t===2){
      if (theme==="lava"){ drawRect(ctx,x,y+12,TILE,20,"#ff5a1f"); drawRect(ctx,x+4,y+16,24,10,"#ffd54a"); }
      else if (theme==="hockey"){ drawRect(ctx,x+4,y+18,24,10,"#111"); }
      else if (theme==="forest"){ drawRect(ctx,x+6,y+10,20,18,"#ff8dc1"); }
      else if (theme==="church"){ drawRect(ctx,x+6,y+8,20,20,"#4e3870"); }
      else if (theme==="hospital"){ drawRect(ctx,x+6,y+8,20,20,"#6bd33f"); }
      else if (theme==="classroom"){ drawRect(ctx,x+4,y+10,24,16,"#fff"); drawRect(ctx,x+4,y+13,24,2,"#ff6d6d"); }
    } else if (t===3){
      const bob = Math.sin(time/10 + tx) * 2;
      drawRect(ctx,x+9,y+8+bob,14,14,"#ffd84a"); drawRect(ctx,x+12,y+11+bob,8,8,"#fff1a0");
    } else if (t===4){
      drawRect(ctx,x+10,y-20,4,20,"#eee"); drawRect(ctx,x+14,y-18,14,10,"#ffd84a");
    }
  }

  function drawMap(){
    const lvl=currentLevel();
    const startCol=Math.max(0,Math.floor(cameraX/TILE)-1);
    const endCol=Math.min(lvl.tiles[0].length,startCol+Math.ceil(W/TILE)+3);
    for(let y=0;y<lvl.tiles.length;y++){
      for(let x=startCol;x<endCol;x++){
        const t=lvl.tiles[y][x];
        if (t!==0) drawTile(x,y,t);
      }
    }
  }

  function drawPlayer(){
    const data = player.character===1 ? sprites.austin : sprites.jordan;
    let frame = 0;
    if (player.attackCooldown > 14) frame = 3;
    else if (Math.abs(player.vx) > 0.1) frame = 1 + (Math.floor(time/8)%2);
    else if (!player.onGround) frame = 4 + (player.vy > 0 ? 1 : 0);
    const sx = frame * data.frameW;
    const dx = Math.round(player.x - cameraX);
    const dy = Math.round(player.y);
    ctx.save();
    if (player.facing < 0){
      ctx.translate(dx + data.frameW, 0);
      ctx.scale(-1,1);
      ctx.drawImage(data.sheet, sx,0,data.frameW,data.frameH, 0,dy,data.frameW,data.frameH);
    } else {
      ctx.drawImage(data.sheet, sx,0,data.frameW,data.frameH, dx,dy,data.frameW,data.frameH);
    }
    ctx.restore();
    if (player.invuln>0 && Math.floor(player.invuln/5)%2===0){
      ctx.fillStyle="rgba(255,255,255,0.25)";
      ctx.fillRect(dx,dy,data.frameW,data.frameH);
    }
  }

  function drawEnemy(e){
    if (e.type === "pickup"){
      const img = e.style==="gift" ? sprites.itemGift : sprites.itemCake;
      ctx.drawImage(img, Math.round(e.x-cameraX), Math.round(e.y + Math.sin(e.bob)*3));
      return;
    }
    ctx.drawImage(sprites.enemies[e.style], Math.round(e.x-cameraX), Math.round(e.y));
  }

  function drawProjectiles(){
    for (const p of projectiles){
      ctx.fillStyle = p.color;
      if (p.kind === "boss"){
        drawRect(ctx,p.x-cameraX,p.y,12,12,"#ff7b22");
        drawRect(ctx,p.x-cameraX+3,p.y+3,6,6,"#ffd54a");
      } else {
        drawRect(ctx,p.x-cameraX,p.y,12,8,p.color);
      }
    }
  }

  function drawGoal(){
    const lvl=currentLevel();
    const x=lvl.goal.x-cameraX, y=16*TILE-64;
    const color=lvl.goal.open ? "#ffd84a" : "#666";
    drawRect(ctx,x,y,32,64,color);
    drawRect(ctx,x+8,y+10,16,16,lvl.goal.open ? "#fff1a0" : "#999");
  }

  function drawBoss(){
    if (!boss || !boss.alive) return;
    const x=Math.round(boss.x-cameraX), y=Math.round(boss.y);
    drawRect(ctx,x,y,72,72,"#7d1d1d");
    drawRect(ctx,x+8,y+8,56,56,"#ff7b22");
    drawRect(ctx,x+16,y+18,10,10,"#fff");
    drawRect(ctx,x+46,y+18,10,10,"#fff");
    drawRect(ctx,x+20,y+22,4,4,"#000");
    drawRect(ctx,x+50,y+22,4,4,"#000");
    drawRect(ctx,x+22,y+46,28,8,"#7d1d1d");
  }

  function drawParticles(){
    for (const p of particles){
      ctx.globalAlpha=Math.max(0,p.life/45);
      drawRect(ctx,p.x-cameraX,p.y,p.size,p.size,p.color);
    }
    ctx.globalAlpha=1;
  }

  function drawHUD(){
    const lvl=currentLevel();
    ctx.fillStyle="rgba(0,0,0,0.45)";
    ctx.fillRect(14,14,430,102);
    ctx.fillStyle="#fff";
    ctx.font="20px monospace";
    ctx.fillText(`Level ${levelIndex+1}: ${lvl.name}`,24,40);
    ctx.font="16px monospace";
    ctx.fillText(`Character: ${player.character===1 ? "Austin" : "Jordan"}`,24,64);
    ctx.fillText(`Coins: ${player.coins}`,24,88);
    ctx.fillText(`Birthday Items: ${player.gifts}`,24,110);
    ctx.fillText("HP:", 260,64);
    for(let i=0;i<player.maxHealth;i++) drawRect(ctx,295+i*20,51,14,14,i<player.health ? "#ff4d4d" : "#555");
    if (boss && boss.alive){
      ctx.fillText(`Boss HP: ${boss.hp}`,260,88);
    } else if (lvl.theme === "lava"){
      ctx.fillText(`Goal: ${lvl.goal.open ? "Open" : "Defeat boss"}`,260,88);
    }
    if (muted){
      ctx.fillStyle="#ffd54a";
      ctx.fillText("MUTED",350,110);
    }
  }

  function drawBanner(){
    if (!banners.length) return;
    const b = banners[0];
    const alpha = Math.min(1, b.timer/20, (b.max - b.timer + 1)/20);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = "#000000cc";
    ctx.fillRect(200, 150, 560, 90);
    ctx.strokeStyle = "#fff";
    ctx.strokeRect(200, 150, 560, 90);
    ctx.fillStyle = "#ffd54a";
    ctx.font = "28px monospace";
    ctx.fillText(b.text, 240, 205);
    ctx.globalAlpha = 1;
  }

  function drawStartScreen(){
    ctx.fillStyle="#050505";
    ctx.fillRect(0,0,W,H);
    for (const s of stars){
      ctx.globalAlpha=s.a;
      drawRect(ctx,s.x,s.y,s.s,s.s,"#fff");
    }
    ctx.globalAlpha=1;

    ctx.fillStyle="#fff";
    ctx.font="34px monospace";
    ctx.fillText("Austin and Jordan:",220,160);
    ctx.fillText("Six Years of Adventure!",150,205);

    ctx.font="18px monospace";
    ctx.fillText("Deluxe birthday edition with music, boss fights, collectibles, and special powers",90,260);
    ctx.fillText("Press ENTER to begin",350,300);
    ctx.fillText("Austin = hockey gear • Jordan = suit",290,330);

    ctx.drawImage(sprites.austin.sheet, 0,0,28,42, 300,365,56,84);
    ctx.drawImage(sprites.jordan.sheet, 0,0,28,42, 600,365,56,84);

    if (showTouchHint){
      ctx.fillStyle="#ffd54a";
      ctx.fillText("On phone: use the buttons below",285,500);
    }
  }

  function drawWinScreen(){
    ctx.fillStyle="#000";
    ctx.fillRect(0,0,W,H);
    for (let i=0;i<90;i++){
      drawRect(ctx,(i*37+time*2)%W,40+(i*17)%420,4,4,["#ffd54a","#ff8fab","#7ad6ff","#b8ff6a"][i%4]);
    }
    ctx.fillStyle="#ffd84a";
    ctx.font="36px monospace";
    ctx.fillText("Adventure Complete!",240,150);
    ctx.fillStyle="#fff";
    ctx.font="22px monospace";
    ctx.fillText("Austin and Jordan made it through all six levels.",120,215);
    ctx.fillText(`Coins Collected: ${player.coins}`,300,255);
    ctx.fillText(`Birthday Items Found: ${player.gifts}`,265,290);
    ctx.fillText("Happy Birthday!",340,345);
    ctx.font="18px monospace";
    ctx.fillText("Refresh the page to play again.",325,400);
  }

  function update(){
    if (!started || won) return;
    time++;
    updatePlayer();
    updateParticles();
    updateBanners();
    updateMusic();
  }

  function draw(){
    if (!started){ drawStartScreen(); return; }
    if (won){ drawWinScreen(); return; }

    const lvl=currentLevel();
    drawBackground(lvl);
    drawMap();
    for(const e of lvl.entities) if (!e.dead && !e.collected) drawEnemy(e);
    drawGoal();
    drawBoss();
    drawProjectiles();
    drawPlayer();
    drawParticles();
    drawHUD();
    drawBanner();
  }

  function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
  }

  startLevel(0);
  loop();
})();
</script>
</body>
</html>
