<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Austin and Jordan: Six Years of Adventure!</title>
  <style>
    :root {
      --ui-bg: #111;
      --ui-fg: #f4f4f4;
      --ui-accent: #ffd54a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #000;
      color: var(--ui-fg);
      font-family: monospace;
      text-align: center;
    }

    h1 {
      margin: 12px 8px 6px;
      font-size: 24px;
    }

    .subtitle {
      margin: 0 8px 10px;
      font-size: 14px;
      opacity: 0.9;
    }

    canvas {
      border: 4px solid #fff;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      max-width: calc(100vw - 16px);
      height: auto;
      background: #000;
      touch-action: none;
    }

    .controls {
      max-width: 900px;
      margin: 8px auto 18px;
      font-size: 13px;
      line-height: 1.5;
      opacity: 0.95;
      padding: 0 10px;
    }

    .mobile-controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 10px auto 20px;
      max-width: 500px;
    }

    .mobile-controls button {
      width: 72px;
      height: 52px;
      font-size: 20px;
      border: 2px solid #fff;
      background: #1d1d1d;
      color: #fff;
      border-radius: 8px;
    }

    .mobile-controls button:active {
      transform: scale(0.98);
      background: #333;
    }
  </style>
</head>
<body>
  <h1>Austin and Jordan: Six Years of Adventure!</h1>
  <div class="subtitle">16-bit style side-scrolling birthday adventure</div>

  <canvas id="game" width="960" height="540"></canvas>

  <div class="controls">
    Keyboard: <b>Enter</b> start, <b>Arrow Keys / A D</b> move, <b>Up / W / Space</b> jump,
    <b>Shift</b> dash, <b>C</b> switch Austin/Jordan.
    On phone, use the buttons below.
  </div>

  <div class="mobile-controls">
    <button id="leftBtn">◀</button>
    <button id="rightBtn">▶</button>
    <button id="jumpBtn">⬆</button>
    <button id="dashBtn">⚡</button>
    <button id="swapBtn">C</button>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const WIDTH = canvas.width;
    const HEIGHT = canvas.height;
    const GRAVITY = 0.55;
    const FLOOR_Y = 460;

    const keys = {};
    let started = false;
    let gameWon = false;

    document.addEventListener("keydown", (e) => {
      keys[e.key.toLowerCase()] = true;

      if (e.key === "Enter") {
        started = true;
      }

      if (e.key.toLowerCase() === "c") {
        player.character = player.character === 1 ? 2 : 1;
      }
    });

    document.addEventListener("keyup", (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    function bindHoldButton(id, keyName, onTap) {
      const btn = document.getElementById(id);
      const press = (e) => {
        e.preventDefault();
        if (keyName) keys[keyName] = true;
        if (onTap) onTap();
      };
      const release = (e) => {
        e.preventDefault();
        if (keyName) keys[keyName] = false;
      };

      btn.addEventListener("touchstart", press, { passive: false });
      btn.addEventListener("touchend", release, { passive: false });
      btn.addEventListener("mousedown", press);
      btn.addEventListener("mouseup", release);
      btn.addEventListener("mouseleave", release);
    }

    bindHoldButton("leftBtn", "arrowleft");
    bindHoldButton("rightBtn", "arrowright");
    bindHoldButton("jumpBtn", " ");
    bindHoldButton("dashBtn", "shift");
    bindHoldButton("swapBtn", null, () => {
      player.character = player.character === 1 ? 2 : 1;
    });

    const player = {
      x: 80,
      y: 0,
      w: 34,
      h: 52,
      vx: 0,
      vy: 0,
      speed: 3.2,
      jumpPower: 11.5,
      onGround: false,
      health: 5,
      maxHealth: 5,
      character: 1, // 1 Austin hockey, 2 Jordan suit
      checkpointX: 80,
      checkpointY: 200,
      invuln: 0,
      facing: 1
    };

    let cameraX = 0;
    let levelIndex = 0;
    let boss = null;
    let particles = [];

    const LEVELS = [
      makeHospitalLevel(),
      makeClassroomLevel(),
      makeHockeyLevel(),
      makeAnimeForestLevel(),
      makeChurchLevel(),
      makeLavaBossLevel()
    ];

    function resetPlayerAtCheckpoint() {
      player.x = player.checkpointX;
      player.y = player.checkpointY;
      player.vx = 0;
      player.vy = 0;
      player.invuln = 90;
    }

    function startLevel(index) {
      levelIndex = index;
      const lvl = LEVELS[levelIndex];
      player.checkpointX = lvl.start.x;
      player.checkpointY = lvl.start.y;
      resetPlayerAtCheckpoint();
      cameraX = 0;
      boss = lvl.boss ? { ...lvl.boss } : null;
      particles = [];
    }

    function nextLevel() {
      if (levelIndex < LEVELS.length - 1) {
        startLevel(levelIndex + 1);
      } else {
        gameWon = true;
      }
    }

    function currentLevel() {
      return LEVELS[levelIndex];
    }

    function rectsOverlap(a, b) {
      return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
      );
    }

    function drawPixelRect(x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
    }

    function drawAustin(x, y, blink) {
      drawPixelRect(x + 8, y + 0, 18, 8, "#1f7a33");   // beanie
      drawPixelRect(x + 10, y + 8, 16, 12, "#efc39a"); // face
      drawPixelRect(x + 10, y + 18, 16, 6, "#cc6c2e"); // beard
      drawPixelRect(x + 6, y + 24, 24, 18, "#117a3a"); // jersey
      drawPixelRect(x + 12, y + 27, 12, 4, "#f6f6f6"); // stripe
      drawPixelRect(x + 8, y + 42, 8, 10, "#3f2a18");  // leg
      drawPixelRect(x + 20, y + 42, 8, 10, "#3f2a18"); // leg
      if (!blink) {
        drawPixelRect(x + 13, y + 12, 2, 2, "#000");
        drawPixelRect(x + 21, y + 12, 2, 2, "#000");
      }
    }

    function drawJordan(x, y, blink) {
      drawPixelRect(x + 10, y + 4, 16, 14, "#efc39a"); // face
      drawPixelRect(x + 10, y + 16, 16, 5, "#7b4a27"); // beard
      drawPixelRect(x + 7, y + 10, 6, 4, "#111");      // glasses
      drawPixelRect(x + 21, y + 10, 6, 4, "#111");
      drawPixelRect(x + 13, y + 11, 8, 2, "#111");
      drawPixelRect(x + 6, y + 22, 24, 20, "#2458b8"); // suit
      drawPixelRect(x + 16, y + 22, 4, 12, "#c72424"); // tie
      drawPixelRect(x + 8, y + 42, 8, 10, "#222");     // leg
      drawPixelRect(x + 20, y + 42, 8, 10, "#222");
      if (!blink) {
        drawPixelRect(x + 14, y + 12, 2, 2, "#000");
        drawPixelRect(x + 20, y + 12, 2, 2, "#000");
      }
    }

    function drawPlayer(px, py) {
      const blink = player.invuln > 0 && Math.floor(player.invuln / 4) % 2 === 0;
      if (player.character === 1) drawAustin(px, py, blink);
      else drawJordan(px, py, blink);
    }

    function damagePlayer(amount = 1) {
      if (player.invuln > 0) return;
      player.health -= amount;
      if (player.health <= 0) {
        player.health = player.maxHealth;
        startLevel(levelIndex);
        return;
      }
      resetPlayerAtCheckpoint();
    }

    function addParticles(x, y, color, count = 8) {
      for (let i = 0; i < count; i++) {
        particles.push({
          x, y,
          vx: (Math.random() - 0.5) * 4,
          vy: -Math.random() * 3 - 1,
          life: 30 + Math.random() * 20,
          color
        });
      }
    }

    function updateParticles() {
      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.15;
        p.life -= 1;
      }
      particles = particles.filter(p => p.life > 0);
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.globalAlpha = Math.max(0, p.life / 50);
        drawPixelRect(p.x - cameraX, p.y, 4, 4, p.color);
      }
      ctx.globalAlpha = 1;
    }

    function getInput() {
      const left = keys["arrowleft"] || keys["a"];
      const right = keys["arrowright"] || keys["d"];
      const jump = keys["arrowup"] || keys["w"] || keys[" "];
      const dash = keys["shift"];
      return { left, right, jump, dash };
    }

    function updatePlayer() {
      const input = getInput();

      let move = 0;
      if (input.left) move -= 1;
      if (input.right) move += 1;

      const topSpeed = input.dash ? 5.3 : player.speed;
      player.vx = move * topSpeed;

      if (move !== 0) player.facing = move;

      if (jumpPressedThisFrame(input.jump) && player.onGround) {
        player.vy = -player.jumpPower;
        player.onGround = false;
      }

      player.vy += GRAVITY;
      if (player.vy > 14) player.vy = 14;

      const lvl = currentLevel();

      player.x += player.vx;
      resolvePlatformCollisions("x", lvl.platforms);

      player.y += player.vy;
      player.onGround = false;
      resolvePlatformCollisions("y", lvl.platforms);

      if (player.y > HEIGHT + 160) {
        damagePlayer(1);
      }

      if (player.invuln > 0) player.invuln--;

      for (const hazard of lvl.hazards) {
        if (rectsOverlap(player, hazard)) {
          damagePlayer(1);
        }
      }

      for (const enemy of lvl.enemies) {
        updateEnemy(enemy);
        if (rectsOverlap(player, enemy)) {
          if (player.vy > 1 && player.y + player.h - 8 < enemy.y + 12) {
            enemy.dead = true;
            player.vy = -8;
            addParticles(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2, enemy.color || "#fff", 10);
          } else {
            damagePlayer(1);
          }
        }
      }
      lvl.enemies = lvl.enemies.filter(e => !e.dead);

      if (lvl.checkpoint && rectsOverlap(player, lvl.checkpoint) && lvl.checkpoint.active !== true) {
        lvl.checkpoint.active = true;
        player.checkpointX = lvl.checkpoint.x;
        player.checkpointY = lvl.checkpoint.y - player.h;
      }

      if (boss) {
        updateBoss(boss);
        if (rectsOverlap(player, boss)) {
          if (player.vy > 1 && player.y + player.h - 8 < boss.y + 14) {
            boss.hp -= 1;
            player.vy = -9;
            addParticles(boss.x + boss.w / 2, boss.y + 10, "#ff8833", 16);
            if (boss.hp <= 0) {
              boss.dead = true;
              addParticles(boss.x + boss.w / 2, boss.y + boss.h / 2, "#ffdd55", 40);
            }
          } else {
            damagePlayer(1);
          }
        }
        if (boss.dead) {
          boss = null;
          lvl.goal.open = true;
        }
      }

      if (rectsOverlap(player, lvl.goal) && (lvl.goal.open !== false)) {
        nextLevel();
      }

      cameraX = clamp(player.x - WIDTH * 0.35, 0, lvl.width - WIDTH);
    }

    function updateEnemy(enemy) {
      enemy.vx = enemy.vx || enemy.speed || 1.1;
      enemy.x += enemy.vx;

      const leftEdge = enemy.minX ?? enemy.x0;
      const rightEdge = enemy.maxX ?? (enemy.x0 + 120);

      if (enemy.x < leftEdge || enemy.x > rightEdge) {
        enemy.vx *= -1;
      }
    }

    function updateBoss(b) {
      b.timer = (b.timer || 0) + 1;
      b.vx = b.vx || 2;
      b.x += b.vx;
      if (b.x < b.minX || b.x + b.w > b.maxX) b.vx *= -1;

      if (b.timer % 75 === 0) {
        const lvl = currentLevel();
        lvl.hazards.push({
          x: b.x + b.w / 2 - 14,
          y: FLOOR_Y - 18,
          w: 28,
          h: 18,
          temp: 180,
          lavaBall: true
        });
      }

      const lvl = currentLevel();
      for (const h of lvl.hazards) {
        if (h.lavaBall) {
          h.y += 2.1;
          h.temp--;
        }
      }
      lvl.hazards = lvl.hazards.filter(h => !h.lavaBall || h.temp > 0);
    }

    function resolvePlatformCollisions(axis, platforms) {
      for (const p of platforms) {
        if (!rectsOverlap(player, p)) continue;

        if (axis === "x") {
          if (player.vx > 0) player.x = p.x - player.w;
          else if (player.vx < 0) player.x = p.x + p.w;
        } else {
          if (player.vy > 0) {
            player.y = p.y - player.h;
            player.vy = 0;
            player.onGround = true;
          } else if (player.vy < 0) {
            player.y = p.y + p.h;
            player.vy = 0;
          }
        }
      }
    }

    let prevJumpDown = false;
    function jumpPressedThisFrame(jumpDown) {
      const pressed = jumpDown && !prevJumpDown;
      prevJumpDown = jumpDown;
      return pressed;
    }

    function clamp(n, min, max) {
      return Math.max(min, Math.min(max, n));
    }

    function drawBackground(lvl) {
      ctx.fillStyle = lvl.sky;
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      for (const band of lvl.backgroundBands) {
        ctx.fillStyle = band.color;
        for (let x = -((cameraX * band.speed) % band.spacing) - band.spacing; x < WIDTH + band.spacing; x += band.spacing) {
          ctx.fillRect(x, band.y, band.w, band.h);
        }
      }

      if (lvl.decor) {
        lvl.decor(cameraX);
      }
    }

    function drawPlatforms(platforms, theme) {
      for (const p of platforms) {
        drawThemeBlock(p, theme);
      }
    }

    function drawThemeBlock(p, theme) {
      const x = p.x - cameraX;
      const y = p.y;

      if (theme === "hospital") {
        drawPixelRect(x, y, p.w, p.h, "#d8edf7");
        drawPixelRect(x, y, p.w, 6, "#ffffff");
        drawPixelRect(x + 6, y + 10, p.w - 12, p.h - 16, "#8ec7d9");
      } else if (theme === "classroom") {
        drawPixelRect(x, y, p.w, p.h, "#8b5a2b");
        drawPixelRect(x, y, p.w, 6, "#c48b4d");
      } else if (theme === "hockey") {
        drawPixelRect(x, y, p.w, p.h, "#dff6ff");
        drawPixelRect(x, y + p.h - 5, p.w, 5, "#9dd2ea");
        drawPixelRect(x + p.w / 2 - 2, y, 4, p.h, "#d33");
      } else if (theme === "forest") {
        drawPixelRect(x, y, p.w, p.h, "#6b4423");
        drawPixelRect(x, y, p.w, 8, "#49a05e");
      } else if (theme === "church") {
        drawPixelRect(x, y, p.w, p.h, "#805f3d");
        drawPixelRect(x + 4, y + 4, p.w - 8, p.h - 8, "#a98354");
      } else if (theme === "lava") {
        drawPixelRect(x, y, p.w, p.h, "#3e3e3e");
        drawPixelRect(x, y + p.h - 6, p.w, 6, "#1f1f1f");
      } else {
        drawPixelRect(x, y, p.w, p.h, "#888");
      }
    }

    function drawHazards(hazards, theme) {
      for (const h of hazards) {
        const x = h.x - cameraX;
        const y = h.y;

        if (theme === "hospital") {
          drawPixelRect(x, y, h.w, h.h, "#77d65c");
          drawPixelRect(x + 4, y + 4, h.w - 8, h.h - 8, "#3b9c27");
        } else if (theme === "classroom") {
          drawPixelRect(x, y, h.w, h.h, "#ffffff");
          drawPixelRect(x, y, h.w, 4, "#ff5d5d");
        } else if (theme === "hockey") {
          drawPixelRect(x, y, h.w, h.h, "#161616");
        } else if (theme === "forest") {
          drawPixelRect(x, y, h.w, h.h, "#ffb3d9");
          drawPixelRect(x + 5, y + 5, h.w - 10, h.h - 10, "#ff7fbe");
        } else if (theme === "church") {
          drawPixelRect(x, y, h.w, h.h, "#4f3b73");
        } else {
          drawPixelRect(x, y, h.w, h.h, "#ff5a1f");
          drawPixelRect(x + 4, y + 4, h.w - 8, h.h - 8, "#ffd43a");
        }
      }
    }

    function drawEnemies(enemies, theme) {
      for (const e of enemies) {
        const x = e.x - cameraX;
        const y = e.y;
        if (theme === "hospital") {
          drawPixelRect(x, y, e.w, e.h, "#73d13d");
          drawPixelRect(x + 4, y + 4, e.w - 8, e.h - 8, "#4b9d1f");
        } else if (theme === "classroom") {
          drawPixelRect(x, y, e.w, e.h, "#f4f4f4");
          drawPixelRect(x, y + 3, e.w, 3, "#ff6d6d");
        } else if (theme === "hockey") {
          drawPixelRect(x, y, e.w, e.h, "#111");
          drawPixelRect(x + 4, y + 4, e.w - 8, e.h - 8, "#333");
        } else if (theme === "forest") {
          drawPixelRect(x, y, e.w, e.h, "#c29bff");
          drawPixelRect(x + 6, y + 6, e.w - 12, e.h - 12, "#fff");
        } else if (theme === "church") {
          drawPixelRect(x, y, e.w, e.h, "#2f2244");
          drawPixelRect(x + 5, y + 5, e.w - 10, e.h - 10, "#64508f");
        } else {
          drawPixelRect(x, y, e.w, e.h, "#902222");
          drawPixelRect(x + 5, y + 5, e.w - 10, e.h - 10, "#ff7b22");
        }
      }
    }

    function drawCheckpoint(cp) {
      if (!cp) return;
      const x = cp.x - cameraX;
      drawPixelRect(x, cp.y, cp.w, cp.h, cp.active ? "#ffd54a" : "#bbb");
      drawPixelRect(x + 8, cp.y - 26, 6, 26, "#e6e6e6");
      drawPixelRect(x + 14, cp.y - 24, 20, 14, cp.active ? "#ffd54a" : "#8aa0b2");
    }

    function drawGoal(goal, theme) {
      const x = goal.x - cameraX;
      const color = goal.open === false ? "#666" : "#ffd54a";
      drawPixelRect(x, goal.y, goal.w, goal.h, color);
      if (theme === "lava" && goal.open === false) {
        drawPixelRect(x + 6, goal.y + 6, goal.w - 12, goal.h - 12, "#aa2222");
      }
    }

    function drawBossEntity(b) {
      const x = b.x - cameraX;
      drawPixelRect(x, b.y, b.w, b.h, "#7a1f1f");
      drawPixelRect(x + 8, b.y + 8, b.w - 16, b.h - 16, "#ff7a1f");
      drawPixelRect(x + 12, b.y + 12, 8, 8, "#fff");
      drawPixelRect(x + b.w - 20, b.y + 12, 8, 8, "#fff");
      drawPixelRect(x + 14, b.y + 14, 4, 4, "#000");
      drawPixelRect(x + b.w - 18, b.y + 14, 4, 4, "#000");
    }

    function drawHUD(lvl) {
      ctx.fillStyle = "rgba(0,0,0,0.45)";
      ctx.fillRect(14, 14, 310, 86);

      ctx.fillStyle = "#fff";
      ctx.font = "20px monospace";
      ctx.fillText(`Level ${levelIndex + 1}: ${lvl.name}`, 24, 40);
      ctx.font = "16px monospace";
      ctx.fillText(`Character: ${player.character === 1 ? "Austin" : "Jordan"}`, 24, 64);

      ctx.fillText("Health:", 24, 88);
      for (let i = 0; i < player.maxHealth; i++) {
        const color = i < player.health ? "#ff4d4d" : "#444";
        drawPixelRect(96 + i * 22, 76, 16, 16, color);
      }

      if (boss) {
        ctx.fillText(`Boss HP: ${boss.hp}`, 210, 88);
      }
    }

    function drawStartScreen() {
      ctx.fillStyle = "#050505";
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      ctx.fillStyle = "#fff";
      ctx.font = "34px monospace";
      ctx.fillText("Austin and Jordan:", 220, 170);
      ctx.fillText("Six Years of Adventure!", 150, 215);

      ctx.font = "18px monospace";
      ctx.fillText("A 16-bit side-scrolling birthday adventure", 250, 270);
      ctx.fillText("Press ENTER to begin", 360, 315);

      drawAustin(320, 355, false);
      drawJordan(560, 355, false);
    }

    function drawWinScreen() {
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      ctx.fillStyle = "#ffd54a";
      ctx.font = "34px monospace";
      ctx.fillText("You Win!", 390, 170);

      ctx.fillStyle = "#fff";
      ctx.font = "24px monospace";
      ctx.fillText("Austin and Jordan completed", 250, 230);
      ctx.fillText("Six Years of Adventure!", 270, 270);

      ctx.font = "18px monospace";
      ctx.fillText("Refresh the page to play again.", 315, 340);
    }

    function update() {
      if (!started || gameWon) return;
      updatePlayer();
      updateParticles();
    }

    function draw() {
      if (!started) {
        drawStartScreen();
        return;
      }

      if (gameWon) {
        drawWinScreen();
        return;
      }

      const lvl = currentLevel();
      drawBackground(lvl);
      drawPlatforms(lvl.platforms, lvl.theme);
      drawHazards(lvl.hazards, lvl.theme);
      drawEnemies(lvl.enemies, lvl.theme);
      drawCheckpoint(lvl.checkpoint);
      drawGoal(lvl.goal, lvl.theme);
      if (boss) drawBossEntity(boss);
      drawPlayer(player.x - cameraX, player.y);
      drawParticles();
      drawHUD(lvl);
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    function platform(x, y, w, h) { return { x, y, w, h }; }
    function hazard(x, y, w, h) { return { x, y, w, h }; }
    function enemy(x, y, w, h, speed, range, color) {
      return {
        x, y, w, h,
        speed,
        vx: speed,
        x0: x,
        minX: x - range,
        maxX: x + range,
        color
      };
    }

    function makeHospitalLevel() {
      return {
        name: "Hospital ER",
        theme: "hospital",
        sky: "#a7d8eb",
        width: 2600,
        start: { x: 80, y: 330 },
        backgroundBands: [
          { color: "#d8f0f8", y: 340, w: 200, h: 140, spacing: 260, speed: 0.2 },
          { color: "#c3e5ef", y: 250, w: 160, h: 100, spacing: 220, speed: 0.4 }
        ],
        decor(cam) {
          ctx.fillStyle = "#ffffff";
          for (let i = 0; i < 8; i++) {
            const x = 120 + i * 300 - cam * 0.3;
            ctx.fillRect(x, 90, 90, 60);
            ctx.fillStyle = "#d14b4b";
